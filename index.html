<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OS Course Grouping - DIT1C</title>
</head>
<body>
    <div class="container">
        <h1>📚 Program Operating System</h1>
        <p class="subtitle">Kelas DIT1C - Pembahagian Kumpulan</p>

        <!-- Group Buttons -->
        <div class="group-buttons">
            <button class="group-btn" id="btn_group1" onclick="selectGroup('group1')">
                🟥 MONO
            </button>
            <button class="group-btn" id="btn_group2" onclick="selectGroup('group2')">
                🟩 LAYERED
            </button>
            <button class="group-btn" id="btn_group3" onclick="selectGroup('group3')">
                🟦 MICRO
            </button>
            <button class="group-btn" id="btn_group4" onclick="selectGroup('group4')">
                🟧 NETWORKED
            </button>
            <button class="group-btn" id="btn_group5" onclick="selectGroup('group5')">
                🟪 KERNEL
            </button>
        </div>

        <!-- Group Display -->
        <div class="group-header">
            <span class="group-title" id="groupTitle">Kumpulan MONO</span>
            <div class="header-actions">
                <span class="member-count" id="memberCount">0/6</span>
                <button class="print-btn" onclick="printGroup()">🖨️ Cetak</button>
            </div>
        </div>

        <!-- Members Grid -->
        <div class="members-grid" id="membersContainer">
            <!-- Dynamic content -->
        </div>

        <!-- Add Member -->
        <div class="add-member-section">
            <input type="text" id="memberInput" placeholder="Masukkan nama pelajar..." />
            <button id="addButton">➕ Tambah</button>
        </div>

        <div class="info-text">
            ⚠️ Setiap kumpulan hanya boleh mempunyai <strong>6 orang</strong> sahaja. 
            Nama yang telah didaftarkan <strong>tidak boleh</strong> dikeluarkan.
        </div>
    </div>

    <!-- Print Template (Hidden) -->
    <div id="printTemplate" style="display: none;">
        <div class="print-container">
            <h1>📚 Program Operating System</h1>
            <h2>Kelas DIT1C - Senarai Kumpulan</h2>
            <div id="printContent"></div>
            <div class="print-footer">
                <p>Dicetak pada: <span id="printDate"></span></p>
                <p>© 2026 - DIT1C</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        // Import the functions you need from the SDKs
        import { initializeApp } from "firebase/app";
        import { getAnalytics } from "firebase/analytics";
        import { 
            getFirestore, 
            collection, 
            doc, 
            setDoc, 
            getDoc, 
            getDocs, 
            updateDoc, 
            arrayUnion, 
            arrayRemove,
            onSnapshot,
            query,
            where,
            deleteField
        } from "firebase/firestore";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDpl9UI-HYH8rjqUhNiU8jc4rF2kMTyttU",
            authDomain: "grouping-fedd0.firebaseapp.com",
            projectId: "grouping-fedd0",
            storageBucket: "grouping-fedd0.firebasestorage.app",
            messagingSenderId: "251221711787",
            appId: "1:251221711787:web:0cadf532bf8a41c91fd0ee",
            measurementId: "G-ZPVYE5ELLV"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        console.log('✅ Firebase Firestore Connected Successfully!');

        // Group names
        const groupNames = {
            group1: "MONO",
            group2: "LAYERED",
            group3: "MICRO",
            group4: "NETWORKED",
            group5: "KERNEL"
        };

        // Maximum members per group
        const MAX_MEMBERS = 6;
        let currentGroup = 'group1';
        let currentMembers = [];

        // Function to add member to a group
        window.addMember = async function() {
            const input = document.getElementById('memberInput');
            const name = input.value.trim();
            
            if (!name) {
                alert('Sila masukkan nama pelajar!');
                return;
            }

            try {
                // Reference to the group document
                const groupRef = doc(db, 'groups', currentGroup);
                const groupSnap = await getDoc(groupRef);
                
                let members = [];
                if (groupSnap.exists()) {
                    members = groupSnap.data().members || [];
                }

                // Check if name already exists in this group
                if (members.some(m => m.toLowerCase() === name.toLowerCase())) {
                    alert(`Nama "${name}" sudah ada dalam kumpulan ${groupNames[currentGroup]}!`);
                    return;
                }

                // Check if group is full
                if (members.length >= MAX_MEMBERS) {
                    alert(`Kumpulan ${groupNames[currentGroup]} sudah penuh! (Maksimum ${MAX_MEMBERS} orang)`);
                    return;
                }

                // Check if name exists in any other group
                const allGroupsSnap = await getDocs(collection(db, 'groups'));
                let nameExistsElsewhere = false;
                
                allGroupsSnap.forEach((docSnap) => {
                    if (docSnap.id !== currentGroup) {
                        const data = docSnap.data();
                        if (data.members && data.members.some(m => m.toLowerCase() === name.toLowerCase())) {
                            nameExistsElsewhere = true;
                        }
                    }
                });

                if (nameExistsElsewhere) {
                    alert(`Nama "${name}" telah didaftarkan dalam kumpulan lain!`);
                    return;
                }

                // Add member to the group
                await setDoc(groupRef, {
                    members: arrayUnion(name),
                    groupName: groupNames[currentGroup],
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                input.value = '';
                alert(`✅ Berjaya mendaftar ${name} ke dalam kumpulan ${groupNames[currentGroup]}!`);
                console.log(`✅ Added ${name} to ${groupNames[currentGroup]}`);

            } catch (error) {
                console.error('❌ Error adding member:', error);
                alert('❌ Ralat: ' + error.message);
            }
        };

        // Function to display group members
        window.displayGroup = function(groupKey) {
            currentGroup = groupKey;
            const groupName = groupNames[groupKey];
            
            // Update header
            document.getElementById('groupTitle').textContent = `Kumpulan ${groupName}`;
            
            // Update input placeholder
            const inputField = document.getElementById('memberInput');
            inputField.placeholder = `Masukkan nama untuk kumpulan ${groupName}...`;
            
            // Listen to real-time updates from Firestore
            const groupRef = doc(db, 'groups', groupKey);
            onSnapshot(groupRef, (docSnap) => {
                const container = document.getElementById('membersContainer');
                container.innerHTML = '';
                
                let members = [];
                if (docSnap.exists()) {
                    members = docSnap.data().members || [];
                }
                
                // Store current members for printing
                currentMembers = members;
                
                // Display existing members
                members.forEach((member) => {
                    const memberDiv = document.createElement('div');
                    memberDiv.className = 'member-box filled';
                    memberDiv.textContent = member;
                    container.appendChild(memberDiv);
                });
                
                // Display empty slots
                const emptySlots = MAX_MEMBERS - members.length;
                for (let i = 0; i < emptySlots; i++) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'member-box empty';
                    emptyDiv.textContent = 'Kosong';
                    container.appendChild(emptyDiv);
                }
                
                // Update member count
                document.getElementById('memberCount').textContent = `${members.length}/${MAX_MEMBERS}`;
            });
        };

        // Function to highlight selected group
        window.selectGroup = function(groupKey) {
            // Remove all highlights
            document.querySelectorAll('.group-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Highlight selected
            const btn = document.getElementById(`btn_${groupKey}`);
            if (btn) btn.classList.add('active');
            
            // Display group
            displayGroup(groupKey);
        };

        // Function to print current group
        window.printGroup = function() {
            const groupName = groupNames[currentGroup];
            const members = currentMembers;
            
            // Get print template
            const printContainer = document.getElementById('printTemplate').cloneNode(true);
            printContainer.style.display = 'block';
            
            // Prepare print content
            const contentDiv = printContainer.querySelector('#printContent');
            
            // Add group info
            let html = `<div class="print-group">
                <h3>Kumpulan: ${groupName}</h3>
                <p>Jumlah Ahli: ${members.length}/${MAX_MEMBERS}</p>
                <ul class="print-members-list">`;
            
            if (members.length === 0) {
                html += `<li style="color: #999; font-style: italic;">Tiada ahli dalam kumpulan ini</li>`;
            } else {
                members.forEach((member, index) => {
                    html += `<li>${index + 1}. ${member}</li>`;
                });
            }
            
            html += `</ul></div>`;
            contentDiv.innerHTML = html;
            
            // Add date
            const now = new Date();
            const dateStr = now.toLocaleDateString('ms-MY', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            printContainer.querySelector('#printDate').textContent = dateStr;
            
            // Add to body temporarily
            document.body.appendChild(printContainer);
            
            // Print
            window.print();
            
            // Remove after print
            setTimeout(() => {
                document.body.removeChild(printContainer);
            }, 1000);
        };

        // Function to print all groups
        window.printAllGroups = async function() {
            try {
                const allGroupsSnap = await getDocs(collection(db, 'groups'));
                const allData = [];
                
                allGroupsSnap.forEach((docSnap) => {
                    const data = docSnap.data();
                    allData.push({
                        id: docSnap.id,
                        name: data.groupName || groupNames[docSnap.id],
                        members: data.members || []
                    });
                });
                
                // Sort by group order
                const order = ['group1', 'group2', 'group3', 'group4', 'group5'];
                allData.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
                
                // Get print template
                const printContainer = document.getElementById('printTemplate').cloneNode(true);
                printContainer.style.display = 'block';
                
                // Prepare print content
                const contentDiv = printContainer.querySelector('#printContent');
                let html = '';
                
                allData.forEach((group) => {
                    html += `<div class="print-group">
                        <h3>Kumpulan: ${group.name}</h3>
                        <p>Jumlah Ahli: ${group.members.length}/${MAX_MEMBERS}</p>
                        <ul class="print-members-list">`;
                    
                    if (group.members.length === 0) {
                        html += `<li style="color: #999; font-style: italic;">Tiada ahli dalam kumpulan ini</li>`;
                    } else {
                        group.members.forEach((member, index) => {
                            html += `<li>${index + 1}. ${member}</li>`;
                        });
                    }
                    
                    html += `</ul></div>`;
                });
                
                contentDiv.innerHTML = html;
                
                // Add date
                const now = new Date();
                const dateStr = now.toLocaleDateString('ms-MY', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                printContainer.querySelector('#printDate').textContent = dateStr;
                
                // Add to body temporarily
                document.body.appendChild(printContainer);
                
                // Print
                window.print();
                
                // Remove after print
                setTimeout(() => {
                    document.body.removeChild(printContainer);
                }, 1000);
                
            } catch (error) {
                console.error('❌ Error printing all groups:', error);
                alert('Ralat semasa mencetak: ' + error.message);
            }
        };

        // Initialize groups in Firestore if they don't exist
        async function initializeGroups() {
            try {
                for (const [key, name] of Object.entries(groupNames)) {
                    const groupRef = doc(db, 'groups', key);
                    const groupSnap = await getDoc(groupRef);
                    
                    if (!groupSnap.exists()) {
                        await setDoc(groupRef, {
                            members: [],
                            groupName: name,
                            createdAt: new Date().toISOString(),
                            updatedAt: new Date().toISOString()
                        });
                        console.log(`✅ Initialized group: ${name}`);
                    }
                }
            } catch (error) {
                console.error('❌ Error initializing groups:', error);
            }
        }

        // Initialize
        window.onload = async function() {
            // Initialize groups in Firestore
            await initializeGroups();
            
            // Setup add button
            const addButton = document.getElementById('addButton');
            addButton.onclick = function(e) {
                e.preventDefault();
                window.addMember();
            };
            
            // Setup Enter key
            const inputField = document.getElementById('memberInput');
            inputField.onkeypress = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    window.addMember();
                }
            };
            
            // Select first group
            selectGroup('group1');
        };

        // Make functions globally accessible
        window.selectGroup = selectGroup;
        window.displayGroup = displayGroup;
        window.addMember = addMember;
        window.printGroup = printGroup;
        window.printAllGroups = printAllGroups;
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 28px;
        }

            margin-bottom: 25px;
            font-size: 16px;
        }

        .group-buttons {

        }

        .group-btn.active {

        }

        /* Individual group colors */

            border-color: #f56565;

        }

            background: #f56565;
            color: white !important;
        }

        .group-btn:nth-child(2) {
            border-color: #48bb78;

            background: #f0fff4;
        }
        .group-btn:nth-child(2).active {
            background: #48bb78;
            color: white !important;
        }

        .group-btn:nth-child(3) {
            border-color: #4299e1;
            color: #4299e1;
            background: #ebf8ff;
        }
        .group-btn:nth-child(3).active {
            background: #4299e1;
            color: white !important;
        }

        .group-btn:nth-child(4) {
            border-color: #ed8936;
            color: #ed8936;
            background: #fffaf0;
        }
        .group-btn:nth-child(4).active {
            background: #ed8936;
            color: white !important;
        }

        .group-btn:nth-child(5) {
            border-color: #9f7aea;

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .group-title {
            font-size: 24px;

            color: #2d3748;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .member-count {
            font-size: 16px;
            color: #718096;
            background: #f7fafc;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .print-btn {
            padding: 8px 16px;
            background: #48bb78;
            color: white;
            border: none;

            transition: all 0.3s ease;
            display: flex;

        .print-btn:hover {
            background: #38a169;

        .print-all-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;

            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;

        .print-all-btn:hover {

            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .member-box {
            border: 2px solid #e2e8f0;
            border-radius: 12px;

            justify-content: center;

        .member-box.empty {
            background: #f7fafc;
            color: #a0aec0;
            border-style: dashed;
            border-color: #cbd5e0;
        }

        .add-member-section {
            display: flex;
            gap: 10px;

        .add-member-section input {
            flex: 1;

        .add-member-section input:focus {

        .add-member-section button {

            transition: all 0.3s ease;

        .add-member-section button:active {

        .info-text {
            text-align: center;

            border: 1px solid #e2e8f0;

        .info-text strong {
            color: #2d3748;
        }

        /* Print Styles */
        @media print {
            body * {
                visibility: hidden;
            }
            
            #printTemplate, #printTemplate * {
                visibility: visible;
            }
            
            #printTemplate {
                position: fixed;
                left: 0;
                top: 0;
                width: 100%;
                padding: 40px;
                background: white;

            }

                margin: 0 auto;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            .print-container h1 {
                text-align: center;
                color: #2d3748;
                font-size: 28px;
                margin-bottom: 5px;
            }

            .print-container h2 {

                color: #4a5568;

                padding: 8px 12px;
                margin-bottom: 5px;
                background: #f7fafc;
                border-radius: 6px;
                font-size: 14px;
                color: #2d3748;
                border-left: 4px solid #667eea;
            }

            .print-members-list li:nth-child(odd) {

            }

            .print-footer {
                text-align: center;
                margin-top: 40px;
                padding-top: 20px;
                border-top: 2px solid #e2e8f0;
                color: #718096;
                font-size: 12px;
            }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .group-buttons {
                grid-template-columns: repeat(3, 1fr);
            }

            .members-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            }

            .add-member-section {
                flex-direction: column;
            }

            .header-actions {
                flex-direction: column;
                align-items: flex-end;
                gap: 8px;
            }

            .print-btn, .print-all-btn {

            }
        }

        @media (max-width: 480px) {
            .group-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .members-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .group-btn {
                font-size: 12px;
                padding: 10px 6px;
            }
        }
    </style>
</body>
</html>
